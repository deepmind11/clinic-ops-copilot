services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-ops-postgres
    environment:
      POSTGRES_USER: clinicops
      POSTGRES_PASSWORD: clinicops_dev
      POSTGRES_DB: clinic_ops
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicops -d clinic_ops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
